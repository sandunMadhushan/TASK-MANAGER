name: Desktop Release (Tauri Updater)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release-windows:
    name: Build + Publish Windows artifacts
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
      VITE_NOVU_APPLICATION_IDENTIFIER: ${{ secrets.VITE_NOVU_APPLICATION_IDENTIFIER }}
      VITE_NOVU_BACKEND_URL: ${{ secrets.VITE_NOVU_BACKEND_URL }}
      VITE_NOVU_SOCKET_URL: ${{ secrets.VITE_NOVU_SOCKET_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Validate required frontend env for production build
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:VITE_API_URL)) {
            throw "Missing secret VITE_API_URL. Add it in GitHub repo secrets before running release workflow."
          }

      - name: Generate app icons
        run: npm run icons:generate

      - name: Build Tauri bundles (signed)
        run: npm run tauri:build

      - name: Generate updater latest.json
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $releaseDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $repo = "${{ github.repository }}"

          $exe = Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -Filter "*.exe" | Select-Object -First 1
          $msi = Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -Filter "*.msi" | Select-Object -First 1

          if ($exe) {
            $artifact = $exe
          } elseif ($msi) {
            $artifact = $msi
          } else {
            throw "No Windows installer artifact (.exe or .msi) found."
          }

          $sigPath = "$($artifact.FullName).sig"
          if (!(Test-Path $sigPath)) {
            throw "Missing signature file: $sigPath"
          }
          $signature = (Get-Content -Path $sigPath -Raw).Trim()

          $downloadUrl = "https://github.com/$repo/releases/download/$tag/$($artifact.Name)"

          $manifest = [ordered]@{
            version = $version
            notes = "Release $tag"
            pub_date = $releaseDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url = $downloadUrl
              }
            }
          }

          $json = $manifest | ConvertTo-Json -Depth 10
          New-Item -ItemType Directory -Path "src-tauri/target/release" -Force | Out-Null
          Set-Content -Path "src-tauri/target/release/latest.json" -Value $json -Encoding utf8

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Nexus Tasks ${{ github.ref_name }}
          files: |
            src-tauri/target/release/latest.json
            src-tauri/target/release/**/latest.json
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.sig
          fail_on_unmatched_files: false
          generate_release_notes: true
