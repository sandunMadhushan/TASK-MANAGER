name: Desktop Release (Tauri Updater)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release-windows:
    name: Build + Publish Windows artifacts
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
      VITE_NOVU_APPLICATION_IDENTIFIER: ${{ secrets.VITE_NOVU_APPLICATION_IDENTIFIER }}
      VITE_NOVU_BACKEND_URL: ${{ secrets.VITE_NOVU_BACKEND_URL }}
      VITE_NOVU_SOCKET_URL: ${{ secrets.VITE_NOVU_SOCKET_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Validate required frontend env for production build
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:VITE_API_URL)) {
            throw "Missing secret VITE_API_URL. Add it in GitHub repo secrets before running release workflow."
          }

      - name: Generate app icons
        run: npm run icons:generate

      - name: Build Tauri bundles (signed)
        run: npm run tauri:build

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Nexus Tasks ${{ github.ref_name }}
          files: |
            src-tauri/target/release/latest.json
            src-tauri/target/release/**/latest.json
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.sig
          fail_on_unmatched_files: false
          generate_release_notes: true
